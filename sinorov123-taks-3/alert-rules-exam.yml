groups:
- name: "exam-alerts"
  rules:
  - alert: "StatusCodeIsNot500"
    expr: probe_http_status_code != 500
    for: 5s
    labels:
      severity: critical
    annotations:
      summary: "The status code is not 500 for more than 5 seconds."
      description: "Trigger an alert if the status code is not 500 for more than 5 seconds."